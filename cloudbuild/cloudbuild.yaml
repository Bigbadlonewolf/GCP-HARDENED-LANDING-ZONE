steps:
  # ── Build and push Docker image ───────────────────────────────────────────
  - id: docker-build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag
      - us-central1-docker.pkg.dev/$PROJECT_ID/landing-zone/demo:$SHORT_SHA
      - --tag
      - us-central1-docker.pkg.dev/$PROJECT_ID/landing-zone/demo:latest
      - app/

  - id: docker-push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/landing-zone/demo
    waitFor: [docker-build]

  # ── OPA policy checks (reuses compliance-as-code policies) ───────────────
  - id: install-opa
    name: alpine
    entrypoint: sh
    args:
      - -c
      - |
        wget -q -O /usr/local/bin/opa \
          https://github.com/open-policy-agent/opa/releases/download/v1.0.0/opa_linux_amd64_static
        chmod +x /usr/local/bin/opa
        opa version

  - id: terraform-plan-security
    name: hashicorp/terraform:1.8
    entrypoint: sh
    args:
      - -c
      - |
        cd terraform/1-security
        terraform init -input=false
        terraform plan -input=false -out=/workspace/security.tfplan
    waitFor: [docker-push]

  - id: terraform-plan-network
    name: hashicorp/terraform:1.8
    entrypoint: sh
    args:
      - -c
      - |
        cd terraform/2-network
        terraform init -input=false
        terraform plan -input=false -out=/workspace/network.tfplan
    waitFor: [docker-push]

  - id: terraform-plan-workload
    name: hashicorp/terraform:1.8
    entrypoint: sh
    args:
      - -c
      - |
        cd terraform/3-workload
        terraform init -input=false
        terraform plan -input=false -out=/workspace/workload.tfplan
    waitFor: [docker-push]

  # ── OPA validate all plans ────────────────────────────────────────────────
  - id: opa-validate-security
    name: alpine
    entrypoint: sh
    args:
      - -c
      - |
        terraform show -json /workspace/security.tfplan > /workspace/security.plan.json
        /usr/local/bin/opa eval \
          --data policies/ \
          --input /workspace/security.plan.json \
          --format pretty \
          '[m | m := data.pci_dss[_].deny[_]]' | tee /workspace/pci-violations.txt
        COUNT=$(wc -l < /workspace/pci-violations.txt)
        [ "$COUNT" -le 2 ] || (echo "PCI DSS violations found — blocking deploy" && exit 1)
    waitFor: [install-opa, terraform-plan-security]

  - id: opa-validate-network
    name: alpine
    entrypoint: sh
    args:
      - -c
      - |
        terraform show -json /workspace/network.tfplan > /workspace/network.plan.json
        /usr/local/bin/opa eval \
          --data policies/ \
          --input /workspace/network.plan.json \
          --format pretty \
          '[m | m := data.pci_dss[_].deny[_]]' | tee /workspace/network-violations.txt
        COUNT=$(wc -l < /workspace/network-violations.txt)
        [ "$COUNT" -le 2 ] || (echo "Network policy violations found — blocking deploy" && exit 1)
    waitFor: [install-opa, terraform-plan-network]

  # ── Apply (only on main branch) ───────────────────────────────────────────
  - id: apply-security
    name: hashicorp/terraform:1.8
    entrypoint: sh
    args:
      - -c
      - |
        if [ "$BRANCH_NAME" = "main" ]; then
          cd terraform/1-security
          terraform apply -input=false -auto-approve /workspace/security.tfplan
        else
          echo "Branch $BRANCH_NAME is not main — skipping apply"
        fi
    waitFor: [opa-validate-security]

  - id: apply-network
    name: hashicorp/terraform:1.8
    entrypoint: sh
    args:
      - -c
      - |
        if [ "$BRANCH_NAME" = "main" ]; then
          cd terraform/2-network
          terraform apply -input=false -auto-approve /workspace/network.tfplan
        else
          echo "Branch $BRANCH_NAME is not main — skipping apply"
        fi
    waitFor: [opa-validate-network, apply-security]

  - id: apply-workload
    name: hashicorp/terraform:1.8
    entrypoint: sh
    args:
      - -c
      - |
        if [ "$BRANCH_NAME" = "main" ]; then
          cd terraform/3-workload
          terraform apply -input=false -auto-approve /workspace/workload.tfplan
        else
          echo "Branch $BRANCH_NAME is not main — skipping apply"
        fi
    waitFor: [apply-network]

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
